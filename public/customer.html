<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer | Barber Booking</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <h1>Barber Appointment Booking</h1>
    <div class="grid">
      <section class="card">
        <h2>Live Barber Status</h2>
        <div id="statusPill" class="status-pill"><span class="dot Offline"></span><span>Offline</span></div>
        <p class="helper" id="businessPhone">Business contact: -</p>
        <p class="helper" id="hours">Working hours: -</p>
      </section>

      <section class="card">
        <h2>Book an Appointment</h2>
        <form id="bookingForm">
          <label for="customerName">Full Name</label>
          <input id="customerName" required />

          <label for="phone">Phone Number</label>
          <input id="phone" type="tel" required placeholder="+1 555 000 0000" />

          <label for="date">Date</label>
          <input id="date" type="date" required />

          <label for="time">Available Time Slots (AM/PM)</label>
          <select id="time" required></select>

          <button type="submit">Request Appointment</button>
        </form>
        <p id="bookingMsg" class="helper"></p>
      </section>

      <section class="card">
        <h2>Confirmed Calendar</h2>
        <div id="confirmedList"></div>
      </section>
    </div>
  </div>

  <script src="/customer.js"></script>
</body>
</html>
